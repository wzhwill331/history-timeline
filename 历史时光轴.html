,"category":"战争","description":"商汤起兵伐桀,鸣条之战击败夏军,夏桀流放而死,商朝建立。","figures":["商汤","夏桀"],"significance":"商朝取代夏朝,青铜文明达到高峰,甲骨文开始使用。"},{"id":3,"title":"盘庚迁殷","year":-1300,"dynasty":"先秦","category":"政治","description":"商王盘庚将都城迁至殷(今河南安阳),此后商朝又称殷商。","figures":["盘庚"],"significance":"迁殷后商朝政治稳定,殷墟成为重要的考古遗址。"},{"id":4,"title":"武王伐纣","year":-1046,"dynasty":"先秦","category":"战争","description":"周武王联合八百诸侯,在牧野之战中击败商纣王,建立西周。","figures":["周武王","商纣王","姜子牙"],"significance":"西周建立,推行分封制和宗法制,奠定了中国封建社会的基础。","image":"./images/event-4.jpg"},{"id":5,"title":"周公制礼作乐","year":-1042,"dynasty":"先秦","category":"文化","description":"周公旦制定礼乐制度,建立了一套完整的政治和文化规范。","figures":["周公旦"],"significance":"礼乐制度成为中华文明的核心,影响中国数千年。"},{"id":6,"title":"国人暴动","year":-841,"dynasty":"先秦","category":"政治","description":"周厉王暴政引发国人暴动,厉王被逐,召公、周公共同执政,史称共和行政。","figures":["周厉王","召公"],"significance":"中国历史有确切纪年的开始(共和元年)。"},{"id":7,"title":"烽火戏诸侯","year":-771,"dynasty":"先秦","category":"政治","description":"周幽王为博褒姒一笑,点燃烽火戏弄诸侯。犬戎攻破镐京,幽王被杀,西周灭亡。","figures":["周幽王","褒姒"],"significance":"西周灭亡,东周开始,中国进入春秋战国时代。"},{"id":8,"title":"孔子创立儒学","year":-500,"dynasty":"先秦","category":"文化","description":"孔子周游列国,广收弟子,创立儒家学派,提出仁、礼、中庸等核心思想。","figures":["孔子"],"significance":"儒家思想成为中国传统文化的主流,影响至今。","image":"./images/event-8.jpg"},{"id":9,"title":"商鞅变法","year":-356,"dynasty":"先秦","category":"政治","description":"商鞅在秦孝公支持下推行变法,废井田、开阡陌、建立县制、奖励军功。","figures":["商鞅","秦孝公"],"significance":"秦国由此强大,为后来统一六国奠定基础。","image":"./images/event-9.jpg"},{"id":10,"title":"百家争鸣","year":-300,"dynasty":"先秦","category":"文化","description":"战国时期儒、道、墨、法、名、兵等各家学说并起,形成思想繁荣局面。","figures":["孟子","庄子","墨子","韩非子","孙子"],"significance":"中国思想史上的黄金时代,奠定了中华文化的基本格局。"},{"id":11,"title":"秦始皇统一六国","year":-221,"dynasty":"秦汉","category":"战争","description":"秦王嬴政先后灭韩、赵、魏、楚、燕、齐六国,建立中国第一个统一的封建王朝。","figures":["秦始皇","李斯","王翦"],"significance":"结束了战国纷争,建立了中央集权制度,统一文字、度量衡。","image":"./images/event-11.jpg"},{"id":12,"title":"书同文车同轨","year":-220,"dynasty":"秦汉","category":"文化","description":"秦始皇统一文字为小篆,统一度量衡和货币,修建驰道统一车轨。","figures":["秦始皇","李斯"],"significance":"促进了全国经济文化交流,巩固了统一。"},{"id":13,"title":"修筑万里长城","year":-214,"dynasty":"秦汉","category":"科技","description":"秦始皇命蒙恬率军北击匈奴,连接秦、赵、燕三国长城,筑成万里长城。","figures":["秦始皇","蒙恬"],"significance":"长城成为中华文明的象征,也是世界建筑奇迹之一。","image":"./images/event-13.jpg"},{"id":14,"title":"陈胜吴广起义","year":-209,"dynasty":"秦汉","category":"战争","description":"陈胜、吴广在大泽乡揭竿而起,喊出「王侯将相宁有种乎」,掀起反秦浪潮。","figures":["陈胜","吴广"],"significance":"中国历史上第一次大规模农民起义,动摇了秦朝统治。"},{"id":15,"title":"楚汉争霸","year":-206,"dynasty":"秦汉","category":"战争","description":"刘邦与项羽争夺天下,历经四年战争,刘邦最终胜出,建立汉朝。","figures":["刘邦","项羽","韩信","张良","萧何"],"significance":"西汉建立,开启了汉朝四百年的辉煌。","image":"./images/event-15.jpg"},{"id":16,"title":"文景之治","year":-180,"dynasty":"秦汉","category":"经济","description":"汉文帝和汉景帝推行轻徭薄赋、与民休息的政策,社会经济恢复发展。","figures":["汉文帝","汉景帝"],"significance":"西汉国力大增,为汉武帝时期的强盛奠定基础。"},{"id":17,"title":"张骞出使西域","year":-138,"dynasty":"秦汉","category":"政治","description":"张骞奉汉武帝之命出使西域,历经13年,开辟了丝绸之路。","figures":["张骞","汉武帝"],"significance":"开辟了东西方交流的丝绸之路,促进了文化和贸易往来。","image":"./images/event-17.jpg"},{"id":18,"title":"罢黜百家独尊儒术","year":-134,"dynasty":"秦汉","category":"文化","description":"董仲舒建议汉武帝罢黜百家、独尊儒术,儒学成为官方正统思想。","figures":["董仲舒","汉武帝"],"significance":"儒学成为中国封建社会的统治思想,影响深远。"},{"id":19,"title":"司马迁著《史记》","year":-91,"dynasty":"秦汉","category":"文化","description":"司马迁忍辱负重,历时十余年完成中国第一部纪传体通史《史记》。","figures":["司马迁"],"significance":"开创了纪传体史书体裁,被誉为「史家之绝唱,无韵之离骚」。","image":"./images/event-19.jpg"},{"id":20,"title":"蔡伦改进造纸术","year":105,"dynasty":"秦汉","category":"科技","description":"蔡伦改进造纸工艺,用树皮、麻头、破布等原料制成纸张,降低成本。","figures":["蔡伦"],"significance":"造纸术是中国四大发明之一,推动了世界文明的发展。","image":"./images/event-20.jpg"},{"id":21,"title":"黄巾起义","year":184,"dynasty":"秦汉","category":"战争","description":"张角领导太平道信众发动黄巾起义,虽被镇压但加速了东汉灭亡。","figures":["张角"],"significance":"东汉名存实亡,群雄割据,三国时代即将来临。"},{"id":22,"title":"官渡之战","year":200,"dynasty":"三国两晋南北朝","category":"战争","description":"曹操以少胜多击败袁绍,奠定了统一北方的基础。","figures":["曹操","袁绍"],"significance":"曹操统一北方,为曹魏政权的建立奠定基础。"},{"id":23,"title":"赤壁之战","year":208,"dynasty":"三国两晋南北朝","category":"战争","description":"孙刘联军在赤壁以火攻大败曹操,三分天下格局初步形成。","figures":["曹操","周瑜","诸葛亮","刘备","孙权"],"significance":"奠定了三国鼎立的格局,是中国历史上以少胜多的经典战例。","image":"./images/event-23.jpg"},{"id":24,"title":"三国鼎立","year":220,"dynasty":"三国两晋南北朝","category":"政治","description":"曹丕称帝建魏,刘备建蜀汉,孙权建吴,三国鼎立局面正式形成。","figures":["曹丕","刘备","孙权"],"significance":"三国时期英雄辈出,成为后世文学艺术的重要题材。"},{"id":25,"title":"诸葛亮北伐","year":228,"dynasty":"三国两晋南北朝","category":"战争","description":"诸葛亮六出祁山北伐曹魏,鞠躬尽瘁,最终病逝五丈原。","figures":["诸葛亮"],"significance":"诸葛亮成为忠诚和智慧的化身,其精神传颂千古。"},{"id":26,"title":"西晋统一","year":280,"dynasty":"三国两晋南北朝","category":"战争","description":"司马炎灭吴,结束三国分裂局面,实现短暂统一。","figures":["司马炎"],"significance":"西晋统一但短暂,八王之乱后迅速衰落。"},{"id":27,"title":"八王之乱","year":291,"dynasty":"三国两晋南北朝","category":"政治","description":"西晋皇族内斗,八王混战十六年,国力严重损耗。","figures":["司马亮","司马玮","司马伦"],"significance":"西晋衰落的直接原因,导致五胡乱华。"},{"id":28,"title":"淝水之战","year":383,"dynasty":"三国两晋南北朝","category":"战争","description":"东晋以八万兵力击败前秦苻坚百万大军,是中国以少胜多的经典战役。","figures":["谢安","谢玄","苻坚"],"significance":"东晋得以延续,南北对峙局面继续维持。","image":"./images/event-28.jpg"},{"id":29,"title":"北魏孝文帝改革","year":494,"dynasty":"三国两晋南北朝","category":"政治","description":"孝文帝迁都洛阳,推行汉化改革,改汉姓、穿汉服、说汉语。","figures":["孝文帝拓跋宏"],"significance":"促进了民族融合,为隋唐大一统奠定了基础。"},{"id":30,"title":"祖冲之计算圆周率","year":480,"dynasty":"三国两晋南北朝","category":"科技","description":"祖冲之将圆周率精确到小数点后七位,领先世界近千年。","figures":["祖冲之"],"significance":"中国古代数学的重大成就,展现了中国科学家的智慧。"},{"id":31,"title":"隋朝统一","year":581,"dynasty":"隋唐","category":"政治","description":"杨坚代周建隋,南下灭陈,结束了近四百年的分裂局面。","figures":["隋文帝杨坚"],"significance":"隋朝统一全国,开创了开皇之治,为唐朝盛世奠基。","image":"./images/event-31.jpg"},{"id":32,"title":"开凿大运河","year":605,"dynasty":"隋唐","category":"科技","description":"隋炀帝征发百万民夫开凿大运河,连通海河、黄河、淮河、长江、钱塘江五大水系。","figures":["隋炀帝"],"significance":"大运河成为南北交通大动脉,促进了经济文化交流。","image":"./images/event-32.jpg"},{"id":33,"title":"科举制度创立","year":605,"dynasty":"隋唐","category":"政治","description":"隋炀帝设进士科,科举制度正式确立,打破了门阀垄断仕途的局面。","figures":["隋炀帝"],"significance":"科举制度延续一千三百多年,是中国古代最重要的选官制度。","image":"./images/event-33.jpg"},{"id":34,"title":"玄武门之变","year":626,"dynasty":"隋唐","category":"政治","description":"李世民在玄武门伏杀太子李建成和齐王李元吉,随后即位为唐太宗。","figures":["李世民","李建成","李元吉"],"significance":"李世民即位后开创贞观之治,唐朝走向强盛。"},{"id":35,"title":"贞观之治","year":630,"dynasty":"隋唐","category":"政治","description":"唐太宗虚心纳谏、任人唯贤,政治清明,经济繁荣,社会安定。","figures":["唐太宗","魏征","房玄龄","杜如晦"],"significance":"中国封建社会的鼎盛时期之一,为开元盛世奠定基础。","image":"./images/event-35.jpg"},{"id":36,"title":"文成公主入藏","year":641,"dynasty":"隋唐","category":"政治","description":"文成公主远嫁吐蕃松赞干布,带去大批工匠和文化典籍。","figures":["文成公主","松赞干布"],"significance":"促进了汉藏文化交流和民族融合。"},{"id":37,"title":"武则天称帝","year":690,"dynasty":"隋唐","category":"政治","description":"武则天废唐建周,成为中国历史上唯一的女皇帝。","figures":["武则天"],"significance":"武则天在位期间延续了贞观之治的发展势头。"},{"id":38,"title":"开元盛世","year":713,"dynasty":"隋唐","category":"经济","description":"唐玄宗前期励精图治,唐朝进入全盛时期,长安成为世界最大城市。","figures":["唐玄宗","姚崇","宋璟"],"significance":"唐朝国力达到顶峰,文化艺术空前繁荣。","image":"./images/event-38.jpg"},{"id":39,"title":"安史之乱","year":755,"dynasty":"隋唐","category":"战争","description":"安禄山、史思明发动叛乱,历时八年,唐朝由盛转衰。","figures":["安禄山","史思明","唐玄宗","郭子仪"],"significance":"唐朝由盛转衰的转折点,藩镇割据局面形成。","image":"./images/event-39.jpg"},{"id":40,"title":"李白杜甫诗歌繁荣","year":740,"dynasty":"隋唐","category":"文化","description":"李白浪漫飘逸、杜甫沉郁顿挫,唐诗达到中国诗歌艺术的最高峰。","figures":["李白","杜甫","白居易","王维"],"significance":"唐诗是中国文学的瑰宝,对后世文学影响深远。","image":"./images/event-40.jpg"},{"id":41,"title":"雕版印刷术发明","year":800,"dynasty":"隋唐","category":"科技","description":"唐朝发明雕版印刷术,现存最早的印刷品是《金刚经》。","figures":[],"significance":"印刷术是中国四大发明之一,推动了文化传播。"},{"id":42,"title":"黄巢起义","year":875,"dynasty":"隋唐","category":"战争","description":"黄巢率农民军攻入长安,虽最终失败但加速了唐朝灭亡。","figures":["黄巢"],"significance":"唐朝名存实亡,五代十国时期即将来临。"},{"id":43,"title":"陈桥兵变","year":960,"dynasty":"五代十国宋元","category":"政治","description":"赵匡胤在陈桥驿被部下黄袍加身,建立宋朝,定都开封。","figures":["赵匡胤"],"significance":"北宋建立,结束了五代十国的分裂局面。"},{"id":44,"title":"杯酒释兵权","year":961,"dynasty":"五代十国宋元","category":"政治","description":"赵匡胤以酒宴方式解除功臣兵权,加强中央集权。","figures":["赵匡胤"],"significance":"宋朝重文轻武的国策由此开始。"},{"id":45,"title":"澶渊之盟","year":1005,"dynasty":"五代十国宋元","category":"政治","description":"宋辽在澶州达成和议,宋朝每年向辽输送岁币,换取和平。","figures":["寇准","宋真宗"],"significance":"宋辽维持了百年和平,但也暴露了宋朝军事上的软弱。"},{"id":46,"title":"活字印刷术发明","year":1040,"dynasty":"五代十国宋元","category":"科技","description":"毕昇发明泥活字印刷术,大大提高了印刷效率。","figures":["毕昇"],"significance":"活字印刷术是中国四大发明之一,比欧洲早四百年。","image":"./images/event-46.jpg"},{"id":47,"title":"王安石变法","year":1069,"dynasty":"五代十国宋元","category":"政治","description":"宋神宗支持王安石推行新法,涉及财政、军事、教育等方面。","figures":["王安石","宋神宗","司马光"],"significance":"变法虽未完全成功,但体现了改革精神。"},{"id":48,"title":"指南针应用于航海","year":1100,"dynasty":"五代十国宋元","category":"科技","description":"宋代将指南针应用于航海,海上贸易空前繁荣。","figures":[],"significance":"指南针是中国四大发明之一,推动了世界航海事业的发展。"},{"id":49,"title":"靖康之变","year":1127,"dynasty":"五代十国宋元","category":"战争","description":"金军攻破开封,掳走徽钦二帝,北宋灭亡。赵构南渡建立南宋。","figures":["宋徽宗","宋钦宗","赵构","岳飞"],"significance":"北宋灭亡,南宋偏安江南,岳飞抗金成为千古佳话。","image":"./images/event-49.jpg"},{"id":50,"title":"岳飞抗金","year":1140,"dynasty":"五代十国宋元","category":"战争","description":"岳飞率岳家军北伐,大破金军,却被十二道金牌召回,后被秦桧害死。","figures":["岳飞","秦桧"],"significance":"岳飞成为精忠报国的象征,其精神激励后人。"},{"id":51,"title":"蒙古西征","year":1219,"dynasty":"五代十国宋元","category":"战争","description":"成吉思汗率蒙古大军西征,征服中亚、西亚大片领土。","figures":["成吉思汗"],"significance":"蒙古帝国成为历史上最大的陆地帝国。"},{"id":52,"title":"忽必烈建立元朝","year":1271,"dynasty":"五代十国宋元","category":"政治","description":"忽必烈改国号为大元,定都大都(今北京),建立元朝。","figures":["忽必烈"],"significance":"元朝实现了中国历史上空前的大统一。","image":"./images/event-52.jpg"},{"id":53,"title":"文天祥就义","year":1283,"dynasty":"五代十国宋元","category":"政治","description":"文天祥拒绝投降元朝,留下「人生自古谁无死,留取丹心照汗青」后从容就义。","figures":["文天祥"],"significance":"文天祥的爱国精神成为中华民族的精神财富。"},{"id":54,"title":"马可·波罗来华","year":1275,"dynasty":"五代十国宋元","category":"文化","description":"意大利旅行家马可·波罗到达中国,在元朝任职十七年,后著《马可·波罗游记》。","figures":["马可·波罗"],"significance":"促进了东西方文化交流,激发了欧洲人对东方的向往。"},{"id":55,"title":"郭守敬编制《授时历》","year":1281,"dynasty":"五代十国宋元","category":"科技","description":"郭守敬编制《授时历》,确定一年为365.2425天,与现行公历一致。","figures":["郭守敬"],"significance":"中国古代历法的最高成就,比欧洲早三百年。"},{"id":56,"title":"红巾军起义","year":1351,"dynasty":"五代十国宋元","category":"战争","description":"韩山童、刘福通领导红巾军起义,朱元璋加入起义军。","figures":["韩山童","刘福通","朱元璋"],"significance":"元朝统治动摇,朱元璋逐渐崛起。"},{"id":57,"title":"朱元璋建立明朝","year":1368,"dynasty":"明清","category":"政治","description":"朱元璋在南京称帝,建立明朝,北伐驱逐元朝残余势力。","figures":["朱元璋"],"significance":"明朝建立,恢复了汉族政权,强化了中央集权。"},{"id":58,"title":"郑和下西洋","year":1405,"dynasty":"明清","category":"政治","description":"郑和奉明成祖之命七下西洋,最远到达非洲东海岸和红海沿岸。","figures":["郑和","明成祖"],"significance":"比欧洲大航海早近百年,展示了明朝的国力和航海技术。","image":"./images/event-58.jpg"},{"id":59,"title":"编纂《永乐大典》","year":1408,"dynasty":"明清","category":"文化","description":"明成祖命解缙等编纂《永乐大典》,收录图书七八千种,是中国最大的类书。","figures":["解缙","明成祖"],"significance":"中国古代最大的百科全书,保存了大量珍贵文献。"},{"id":60,"title":"土木堡之变","year":1449,"dynasty":"明清","category":"战争","description":"明英宗亲征瓦剌,在土木堡兵败被俘。于谦组织北京保卫战,击退瓦剌。","figures":["明英宗","于谦"],"significance":"明朝由盛转衰的转折点,于谦的爱国精神令人敬佩。"},{"id":61,"title":"王阳明心学","year":1500,"dynasty":"明清","category":"文化","description":"王阳明提出知行合一、致良知等思想,创立阳明心学。","figures":["王阳明"],"significance":"心学影响了中国和日本的思想界,至今仍有重要意义。"},{"id":62,"title":"戚继光抗倭","year":1560,"dynasty":"明清","category":"战争","description":"戚继光组建戚家军,发明鸳鸯阵,基本肃清东南沿海倭患。","figures":["戚继光"],"significance":"保卫了东南沿海的安全,戚继光成为民族英雄。"},{"id":63,"title":"李时珍著《本草纲目》","year":1578,"dynasty":"明清","category":"科技","description":"李时珍历时二十七年完成《本草纲目》,收录药物1892种。","figures":["李时珍"],"significance":"中国古代药物学的集大成之作,被誉为东方医药巨典。","image":"./images/event-63.jpg"},{"id":64,"title":"利玛窦来华传教","year":1583,"dynasty":"明清","category":"文化","description":"意大利传教士利玛窦来华,带来西方科学知识,与徐光启合译《几何原本》。","figures":["利玛窦","徐光启"],"significance":"开启了中西文化交流的新篇章。"},{"id":65,"title":"努尔哈赤建立后金","year":1616,"dynasty":"明清","category":"政治","description":"努尔哈赤统一女真各部,建立后金政权,创建八旗制度。","figures":["努尔哈赤"],"significance":"后金(清朝前身)崛起,明朝面临严峻挑战。"},{"id":66,"title":"李自成起义","year":1644,"dynasty":"明清","category":"战争","description":"李自成率农民军攻入北京,崇祯帝自缢,明朝灭亡。","figures":["李自成","崇祯帝"],"significance":"明朝灭亡,但李自成的大顺政权很快被清军击败。"},{"id":67,"title":"清朝入关","year":1644,"dynasty":"明清","category":"战争","description":"吴三桂引清兵入关,清军击败李自成,定都北京,开始统一全国。","figures":["多尔衮","吴三桂","顺治帝"],"significance":"清朝建立,开始了对中国的统治。"},{"id":68,"title":"郑成功收复台湾","year":1662,"dynasty":"明清","category":"战争","description":"郑成功率军从荷兰殖民者手中收复台湾,建立反清基地。","figures":["郑成功"],"significance":"收复了被荷兰占领38年的台湾,维护了国家领土完整。","image":"./images/event-68.jpg"},{"id":69,"title":"康熙平定三藩","year":1681,"dynasty":"明清","category":"战争","description":"康熙帝历时八年平定吴三桂等三藩之乱,巩固了清朝统治。","figures":["康熙帝","吴三桂"],"significance":"清朝中央集权加强,为康乾盛世奠定基础。"},{"id":70,"title":"康乾盛世","year":1700,"dynasty":"明清","category":"经济","description":"康熙、雍正、乾隆三朝,清朝国力达到顶峰,人口突破三亿。","figures":["康熙帝","雍正帝","乾隆帝"],"significance":"中国封建社会最后一个盛世,但已开始落后于西方。"},{"id":71,"title":"曹雪芹著《红楼梦》","year":1750,"dynasty":"明清","category":"文化","description":"曹雪芹创作《红楼梦》,以贾宝玉和林黛玉的爱情悲剧为主线,展现封建社会的兴衰。","figures":["曹雪芹"],"significance":"中国古典小说的巅峰之作,被誉为中国封建社会的百科全书。"},{"id":72,"title":"闭关锁国","year":1757,"dynasty":"明清","category":"政治","description":"乾隆帝下令仅保留广州一口通商,实行闭关锁国政策。","figures":["乾隆帝"],"significance":"中国逐渐落后于世界潮流,为近代屈辱埋下伏笔。"},{"id":73,"title":"林则徐虎门销烟","year":1839,"dynasty":"近代史","category":"政治","description":"林则徐在虎门海滩销毁鸦片两万余箱,展现了中国人民反抗侵略的决心。","figures":["林则徐"],"significance":"虎门销烟成为鸦片战争的导火索,林则徐是近代民族英雄。"},{"id":74,"title":"鸦片战争","year":1840,"dynasty":"近代史","category":"战争","description":"英国以虎门销烟为借口发动鸦片战争,清政府战败,签订《南京条约》。","figures":["道光帝","琦善"],"significance":"中国近代史的开端,开始沦为半殖民地半封建社会。","image":"./images/event-74.jpg"},{"id":75,"title":"《南京条约》签订","year":1842,"dynasty":"近代史","category":"政治","description":"清政府被迫签订中国近代第一个不平等条约,割让香港岛,开放五口通商。","figures":["耆英","璞鼎查"],"significance":"中国开始沦为半殖民地半封建社会,主权遭到严重破坏。"},{"id":76,"title":"太平天国运动","year":1851,"dynasty":"近代史","category":"战争","description":"洪秀全在金田起义,建立太平天国,定都天京,持续十四年。","figures":["洪秀全","杨秀清","石达开"],"significance":"中国近代规模最大的农民运动,沉重打击了清朝统治。"},{"id":77,"title":"第二次鸦片战争","year":1856,"dynasty":"近代史","category":"战争","description":"英法联军发动第二次鸦片战争,火烧圆明园,逼签《天津条约》《北京条约》。","figures":["咸丰帝","额尔金"],"significance":"中国半殖民地化程度进一步加深,圆明园成为民族伤痛。"},{"id":78,"title":"洋务运动","year":1861,"dynasty":"近代史","category":"经济","description":"曾国藩、李鸿章等推行'师夷长技以制夷'，创办近代军事和民用工业。","figures":["曾国藩","李鸿章","左宗棠","张之洞"],"significance":"中国近代化的开端,引进了西方先进技术。"},{"id":79,"title":"甲午中日战争","year":1894,"dynasty":"近代史","category":"战争","description":"日本发动侵华战争,北洋水师全军覆没,签订《马关条约》。","figures":["邓世昌","丁汝昌","李鸿章"],"significance":"洋务运动失败,列强掀起瓜分中国狂潮,民族危机加深。","image":"./images/event-79.jpg"},{"id":80,"title":"戊戌变法","year":1898,"dynasty":"近代史","category":"政治","description":"康有为、梁启超推动光绪帝实行变法维新,历时103天即被慈禧太后扼杀。","figures":["康有为","梁启超","光绪帝","谭嗣同"],"significance":"中国近代第一次思想解放运动,虽然失败但传播了维新思想。"},{"id":81,"title":"八国联军侵华","year":1900,"dynasty":"近代史","category":"战争","description":"英美法德俄日意奥八国联军攻占北京,签订《辛丑条约》。","figures":["慈禧太后","瓦德西"],"significance":"中国完全沦为半殖民地半封建社会,清政府成为洋人的朝廷。"},{"id":82,"title":"清末新政","year":1901,"dynasty":"近代史","category":"政治","description":"清政府推行新政改革,废除科举、编练新军、派遣留学生。","figures":["慈禧太后"],"significance":"客观上推动了中国近代化,但也加速了清朝灭亡。"},{"id":83,"title":"中国同盟会成立","year":1905,"dynasty":"近代史","category":"政治","description":"孙中山在日本东京成立中国同盟会,提出'驱除鞑虏、恢复中华、创立民国、平均地权'。","figures":["孙中山","黄兴"],"significance":"中国第一个全国性资产阶级革命政党,推动了辛亥革命。"},{"id":84,"title":"辛亥革命","year":1911,"dynasty":"近代史","category":"战争","description":"武昌起义爆发,各省纷纷响应,清朝统治土崩瓦解。","figures":["孙中山","黄兴","黎元洪"],"significance":"推翻了两千多年的封建帝制,建立了中华民国。","image":"./images/event-84.jpg"},{"id":85,"title":"中华民国成立","year":1912,"dynasty":"近代史","category":"政治","description":"孙中山在南京就任临时大总统,中华民国成立,随后让位于袁世凯。","figures":["孙中山","袁世凯"],"significance":"亚洲第一个民主共和国,结束了封建帝制。"},{"id":86,"title":"新文化运动","year":1915,"dynasty":"近代史","category":"文化","description":"陈独秀创办《新青年》,高举民主与科学旗帜,掀起思想解放运动。","figures":["陈独秀","李大钊","胡适","鲁迅"],"significance":"中国近代最伟大的思想解放运动,为五四运动奠定了思想基础。"},{"id":87,"title":"五四运动","year":1919,"dynasty":"近代史","category":"政治","description":"巴黎和会外交失败引发五四爱国运动,'外争主权、内除国贼'响彻全国。","figures":["陈独秀","李大钊"],"significance":"中国新民主主义革命的开端,工人阶级登上政治舞台。","image":"./images/event-87.jpg"},{"id":88,"title":"中国共产党成立","year":1921,"dynasty":"近代史","category":"政治","description":"中共一大在上海召开,中国共产党正式成立,中国革命面貌焕然一新。","figures":["毛泽东","董必武","李达"],"significance":"中国历史上开天辟地的大事,中国革命有了坚强的领导核心。","image":"./images/event-88.jpg"},{"id":89,"title":"北伐战争","year":1926,"dynasty":"近代史","category":"战争","description":"国民革命军出师北伐,国共合作打倒军阀,后因蒋介石叛变革命而失败。","figures":["蒋介石","周恩来","叶挺"],"significance":"基本推翻了北洋军阀统治,但国共合作破裂。"},{"id":90,"title":"南昌起义","year":1927,"dynasty":"近代史","category":"战争","description":"周恩来、贺龙等领导南昌起义,打响了武装反抗国民党反动派的第一枪。","figures":["周恩来","贺龙","朱德","叶挺"],"significance":"中国共产党独立领导武装斗争的开始,建军节由此而来。"},{"id":91,"title":"井冈山革命根据地","year":1927,"dynasty":"近代史","category":"政治","description":"毛泽东创建井冈山革命根据地,开辟了农村包围城市、武装夺取政权的道路。","figures":["毛泽东","朱德"],"significance":"中国革命新道路的起点,马克思主义中国化的伟大开篇。"},{"id":92,"title":"九一八事变","year":1931,"dynasty":"近代史","category":"战争","description":"日本关东军炸毁南满铁路柳条湖段,炮轰北大营,侵占中国东北。","figures":["张学良"],"significance":"中国人民抗日战争的起点,揭开了世界反法西斯战争的序幕。"},{"id":93,"title":"红军长征","year":1934,"dynasty":"近代史","category":"战争","description":"中央红军从瑞金出发,历经两万五千里长征,到达陕北。","figures":["毛泽东","周恩来","朱德"],"significance":"人类历史上的伟大壮举,保存了革命火种。","image":"./images/event-93.jpg"},{"id":94,"title":"遵义会议","year":1935,"dynasty":"近代史","category":"政治","description":"中共中央在遵义召开政治局扩大会议,确立了毛泽东的领导地位。","figures":["毛泽东","周恩来","张闻天"],"significance":"中国共产党生死攸关的转折点,挽救了党、挽救了红军。"},{"id":95,"title":"西安事变","year":1936,"dynasty":"近代史","category":"政治","description":"张学良、杨虎城发动兵谏,逼蒋抗日,促成第二次国共合作。","figures":["张学良","杨虎城","蒋介石","周恩来"],"significance":"成为扭转时局的关键,促成了抗日民族统一战线的建立。"},{"id":96,"title":"卢沟桥事变","year":1937,"dynasty":"近代史","category":"战争","description":"日军在卢沟桥发动全面侵华战争,中国守军奋起抵抗,全面抗战爆发。","figures":["佟麟阁","赵登禹"],"significance":"中国全民族抗战的起点,中华民族到了最危险的时候。","image":"./images/event-96.jpg"},{"id":97,"title":"南京大屠杀","year":1937,"dynasty":"近代史","category":"战争","description":"日军攻占南京,进行长达六周的大屠杀,遇难同胞超过30万人。","figures":[],"significance":"人类历史上最黑暗的一页,铭记历史,勿忘国耻。","image":"./images/event-97.jpg"},{"id":98,"title":"台儿庄战役","year":1938,"dynasty":"近代史","category":"战争","description":"李宗仁指挥中国军队在台儿庄取得抗战以来正面战场的重大胜利。","figures":["李宗仁"],"significance":"打破了日军不可战胜的神话,极大地鼓舞了全国军民的抗战士气。"},{"id":99,"title":"百团大战","year":1940,"dynasty":"近代史","category":"战争","description":"彭德怀指挥八路军在华北发动百团大战,沉重打击了日军的'囚笼政策'。","figures":["彭德怀"],"significance":"抗日战争中中国军队主动出击的最大规模战役。"},{"id":100,"title":"中共七大","year":1945,"dynasty":"近代史","category":"政治","description":"中共七大在延安召开,确立毛泽东思想为党的指导思想。","figures":["毛泽东","刘少奇","周恩来"],"significance":"为抗日战争和新民主主义革命的胜利奠定了基础。"},{"id":101,"title":"抗日战争胜利","year":1945,"dynasty":"近代史","category":"战争","description":"日本宣布无条件投降,中国人民取得抗日战争的伟大胜利。","figures":[],"significance":"中国人民反抗外来侵略第一次取得完全胜利,民族复兴的转折点。","image":"./images/event-101.jpg"},{"id":102,"title":"重庆谈判","year":1945,"dynasty":"近代史","category":"政治","description":"毛泽东赴重庆与蒋介石谈判,签订《双十协定》。","figures":["毛泽东","蒋介石"],"significance":"中国共产党争取和平民主的努力,揭露了国民党假和平的面目。"},{"id":103,"title":"三大战役","year":1948,"dynasty":"近代史","category":"战争","description":"辽沈、淮海、平津三大战役,基本消灭国民党军队主力。","figures":["林彪","刘伯承","邓小平","聂荣臻"],"significance":"解放战争的决定性胜利,奠定了解放全国的基础。"},{"id":104,"title":"渡江战役","year":1949,"dynasty":"近代史","category":"战争","description":"百万雄师过大江,解放南京,国民党政权在大陆的统治覆灭。","figures":[],"significance":"宣告了国民党反动统治的覆灭,为新中国成立扫清了障碍。"},{"id":105,"title":"中华人民共和国成立","year":1949,"dynasty":"近代史","category":"政治","description":"毛泽东在天安门城楼庄严宣告中华人民共和国成立,中国人民从此站起来了。","figures":["毛泽东"],"significance":"开辟了中国历史的新纪元,中华民族从此屹立于世界民族之林。","image":"./images/event-105.jpg"}]`),xu=[`先秦`,`秦汉`,`三国两晋南北朝`,`隋唐`,`五代十国宋元`,`明清`,`近代史`],Su={先秦:{dot:`bg-amber-600`,line:`bg-amber-300`,card:`border-amber-400 hover:border-amber-600`,tag:`bg-amber-100 text-amber-800`,accent:`text-amber-700`,bg:`bg-amber-600`,text:`text-amber-800
